<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西語陰陽性快問快答</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        #score-display {
            color: #666;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            text-align: left;
            background-color: #f8fbff;
            border: 1px solid #dce8f5;
            border-radius: 10px;
            padding: 12px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .control-row label {
            font-size: 0.95em;
            color: #2c3e50;
            font-weight: 600;
        }
        .control-row select {
            flex: 1;
            max-width: 210px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #b9cde1;
            font-size: 0.95em;
        }
        #start-btn {
            background-color: #16a085;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #start-btn:hover { background-color: #13876f; }
        #question-box {
            font-size: 2.5em;
            color: #2c3e50;
            margin: 20px 0;
            padding: 20px;
            background-color: #e8f4f8;
            border-radius: 10px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        button.option-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button.option-btn:hover {
            background-color: #2980b9;
        }
        button.option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        /* 答題回饋顏色 */
        .correct { background-color: #2ecc71 !important; }
        .wrong { background-color: #e74c3c !important; }
        
        #feedback {
            font-size: 1.2em;
            font-weight: bold;
            min-height: 30px;
            margin-bottom: 15px;
        }
        #next-btn {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }
        #next-btn:hover { background-color: #d68910; }
        #review-section {
            text-align: left;
            margin-top: 15px;
            display: none;
            background: #fff8f2;
            border: 1px solid #f3d4b5;
            border-radius: 10px;
            padding: 12px;
        }
        #review-section h3 {
            margin: 0 0 10px 0;
            font-size: 1.05em;
            color: #8a4b08;
        }
        #review-list {
            margin: 0;
            padding-left: 18px;
            color: #444;
        }
        #review-list li {
            margin-bottom: 8px;
            line-height: 1.45;
        }
        @media (max-width: 600px) {
            #game-container {
                width: 100%;
                max-width: 100%;
                padding: 18px 14px;
                border-radius: 12px;
            }
            h1 {
                font-size: 1.45rem;
            }
            #score-display {
                font-size: 0.95rem;
                line-height: 1.5;
            }
            #question-box {
                font-size: clamp(1.4rem, 8vw, 2rem);
                padding: 14px;
                margin: 14px 0;
            }
            .options-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            button.option-btn {
                width: 100%;
                min-height: 56px;
                font-size: 1.06rem;
                padding: 12px;
            }
            #start-btn, #next-btn {
                width: 100%;
                min-height: 48px;
                font-size: 1rem;
            }
            .control-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .control-row select {
                width: 100%;
                max-width: none;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>閃卡快問快答</h1>
    <div id="score-display">分數: <span id="score">0</span> | 題目: <span id="progress">0/10</span> | 倒數: <span id="timer">10</span>s</div>
    
    <div id="controls">
        <div class="control-row">
            <label for="difficulty-select">難度：</label>
            <select id="difficulty-select">
                <option value="easy">簡單（10題）</option>
                <option value="medium">中等（10題）</option>
                <option value="hard">困難（10題）</option>
                <option value="all" selected>混合（30題中抽10題）</option>
            </select>
        </div>
        <div class="control-row">
            <label for="mode-select">出題方向：</label>
            <select id="mode-select">
                <option value="zhToEs" selected>中文題目 -> 選西文</option>
                <option value="esToZh">西文題目 -> 選中文</option>
            </select>
        </div>
        <button id="start-btn" onclick="startGame()">開始新測驗</button>
    </div>
    
    <div id="question-box">載入中...</div>
    <div id="feedback"></div>

    <div class="options-grid" id="options-container">
        </div>

    <button id="next-btn" onclick="nextQuestion()">下一題</button>
    <div id="review-section">
        <h3>錯題回顧</h3>
        <ul id="review-list"></ul>
    </div>
</div>

<script>
    // 30 題題庫：易/中/難各 10 題
    const vocabulary = [
        { zh: "蘋果", es: "manzana", article: "la", level: "easy" },
        { zh: "書本", es: "libro", article: "el", level: "easy" },
        { zh: "桌子", es: "mesa", article: "la", level: "easy" },
        { zh: "狗", es: "perro", article: "el", level: "easy" },
        { zh: "貓", es: "gato", article: "el", level: "easy" },
        { zh: "房子", es: "casa", article: "la", level: "easy" },
        { zh: "男孩", es: "niño", article: "el", level: "easy" },
        { zh: "女孩", es: "niña", article: "la", level: "easy" },
        { zh: "水", es: "agua", article: "el", level: "easy" },
        { zh: "學校", es: "escuela", article: "la", level: "easy" },

        { zh: "城市", es: "ciudad", article: "la", level: "medium" },
        { zh: "國家", es: "país", article: "el", level: "medium" },
        { zh: "早上", es: "mañana", article: "la", level: "medium" },
        { zh: "工作", es: "trabajo", article: "el", level: "medium" },
        { zh: "食物", es: "comida", article: "la", level: "medium" },
        { zh: "時間", es: "tiempo", article: "el", level: "medium" },
        { zh: "問題", es: "pregunta", article: "la", level: "medium" },
        { zh: "老師", es: "profesor", article: "el", level: "medium" },
        { zh: "朋友", es: "amigo", article: "el", level: "medium" },
        { zh: "家人", es: "familia", article: "la", level: "medium" },

        { zh: "知識", es: "conocimiento", article: "el", level: "hard" },
        { zh: "希望", es: "esperanza", article: "la", level: "hard" },
        { zh: "挑戰", es: "desafío", article: "el", level: "hard" },
        { zh: "經濟", es: "economía", article: "la", level: "hard" },
        { zh: "文化", es: "cultura", article: "la", level: "hard" },
        { zh: "未來", es: "futuro", article: "el", level: "hard" },
        { zh: "旅程", es: "viaje", article: "el", level: "hard" },
        { zh: "機會", es: "oportunidad", article: "la", level: "hard" },
        { zh: "記憶", es: "memoria", article: "la", level: "hard" },
        { zh: "責任", es: "responsabilidad", article: "la", level: "hard" }
    ];

    let currentWord = null;
    let score = 0;
    let selectedQuestions = [];
    let questionIndex = 0;
    let gameMode = "zhToEs";
    const TOTAL_QUESTIONS = 10;
    const QUESTION_TIME_LIMIT = 10;
    let timerValue = QUESTION_TIME_LIMIT;
    let timerInterval = null;
    let currentAnswered = false;
    const wrongAnswers = [];

    // 陣列洗牌函數 (讓選項順序隨機)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getQuestionPoolByDifficulty() {
        const selectedDifficulty = document.getElementById("difficulty-select").value;
        if (selectedDifficulty === "all") {
            return [...vocabulary];
        }
        return vocabulary.filter(word => word.level === selectedDifficulty);
    }

    function buildQuestionSet() {
        const pool = getQuestionPoolByDifficulty();
        if (pool.length < TOTAL_QUESTIONS) {
            return [];
        }
        return shuffleArray([...pool]).slice(0, TOTAL_QUESTIONS);
    }

    function updateHeaderInfo() {
        document.getElementById("score").innerText = score;
        document.getElementById("progress").innerText = `${Math.min(questionIndex + 1, TOTAL_QUESTIONS)}/${TOTAL_QUESTIONS}`;
        document.getElementById("timer").innerText = timerValue;
    }

    function getRandomWrongWordsFromCurrentPool(excludeWord, count) {
        const currentPool = getQuestionPoolByDifficulty();
        const filteredPool = currentPool.filter(word => word.es !== excludeWord.es);
        return shuffleArray(filteredPool).slice(0, count);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        stopTimer();
        timerValue = QUESTION_TIME_LIMIT;
        document.getElementById("timer").innerText = timerValue;
        timerInterval = setInterval(() => {
            timerValue -= 1;
            document.getElementById("timer").innerText = Math.max(timerValue, 0);
            if (timerValue <= 0) {
                stopTimer();
                handleTimeUp();
            }
        }, 1000);
    }

    function getCorrectAnswerText() {
        return gameMode === "zhToEs"
            ? `${currentWord.article} ${currentWord.es}`
            : currentWord.zh;
    }

    function getQuestionPromptText() {
        return gameMode === "zhToEs"
            ? currentWord.zh
            : `${currentWord.article} ${currentWord.es}`;
    }

    function recordWrongAnswer(selectedText) {
        wrongAnswers.push({
            prompt: getQuestionPromptText(),
            selected: selectedText,
            correct: getCorrectAnswerText()
        });
    }

    function handleTimeUp() {
        if (currentAnswered) return;
        const feedbackDiv = document.getElementById("feedback");
        const allBtns = document.querySelectorAll('.option-btn');
        const rightBtnText = getCorrectAnswerText();

        currentAnswered = true;
        allBtns.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === rightBtnText) {
                btn.classList.add("correct");
            }
        });
        recordWrongAnswer("未作答（超時）");
        feedbackDiv.innerText = "時間到！正確答案是: " + rightBtnText;
        feedbackDiv.style.color = "#e74c3c";

        questionIndex += 1;
        if (questionIndex < TOTAL_QUESTIONS) {
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("next-btn").innerText = "下一題";
        } else {
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("next-btn").innerText = "查看結果";
        }
    }

    // 載入題目
    function loadQuestion() {
        // 重置介面
        stopTimer();
        currentAnswered = false;
        document.getElementById("feedback").innerText = "";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("review-section").style.display = "none";
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        if (questionIndex >= TOTAL_QUESTIONS) {
            showFinalResult();
            return;
        }

        currentWord = selectedQuestions[questionIndex];
        updateHeaderInfo();

        const wrongWords = getRandomWrongWordsFromCurrentPool(currentWord, 3);
        if (wrongWords.length < 3) {
            document.getElementById("question-box").innerText = "題庫不足，請調整設定。";
            return;
        }

        let options = [];
        if (gameMode === "zhToEs") {
            document.getElementById("question-box").innerText = currentWord.zh;
            options = [
                { text: `${currentWord.article} ${currentWord.es}`, isCorrect: true },
                ...wrongWords.map(word => ({ text: `${word.article} ${word.es}`, isCorrect: false }))
            ];
        } else {
            document.getElementById("question-box").innerText = `${currentWord.article} ${currentWord.es}`;
            options = [
                { text: currentWord.zh, isCorrect: true },
                ...wrongWords.map(word => ({ text: word.zh, isCorrect: false }))
            ];
        }

        options = shuffleArray(options);

        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => checkAnswer(btn, opt.isCorrect);
            optionsContainer.appendChild(btn);
        });

        startTimer();
    }

    // 檢查答案
    function checkAnswer(clickedBtn, isCorrect) {
        if (currentAnswered) return;
        currentAnswered = true;
        stopTimer();

        const allBtns = document.querySelectorAll('.option-btn');
        const feedbackDiv = document.getElementById("feedback");
        const rightBtnText = getCorrectAnswerText();

        // 禁用所有按鈕防止重複點擊
        allBtns.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            clickedBtn.classList.add("correct");
            feedbackDiv.innerText = "答對了！🎉";
            feedbackDiv.style.color = "#2ecc71";
            score += 10;
        } else {
            clickedBtn.classList.add("wrong");
            recordWrongAnswer(clickedBtn.innerText);
            feedbackDiv.innerText = "答錯了！正確答案是: " + rightBtnText;
            feedbackDiv.style.color = "#e74c3c";
            
            // 找出正確的按鈕並標示為綠色
            allBtns.forEach(btn => {
                if (btn.innerText === rightBtnText) {
                    btn.classList.add("correct");
                }
            });
        }

        document.getElementById("score").innerText = score;
        questionIndex += 1;

        if (questionIndex < TOTAL_QUESTIONS) {
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("next-btn").innerText = "下一題";
        } else {
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("next-btn").innerText = "查看結果";
        }
    }

    function showFinalResult() {
        stopTimer();
        document.getElementById("question-box").innerText = `測驗完成！總分 ${score}/100`;
        document.getElementById("feedback").innerText = "可更換難度或玩法後，按「開始新測驗」再玩一次。";
        document.getElementById("feedback").style.color = "#2c3e50";
        document.getElementById("options-container").innerHTML = "";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("progress").innerText = `${TOTAL_QUESTIONS}/${TOTAL_QUESTIONS}`;
        document.getElementById("timer").innerText = "0";

        const reviewSection = document.getElementById("review-section");
        const reviewList = document.getElementById("review-list");
        reviewList.innerHTML = "";

        if (wrongAnswers.length === 0) {
            const li = document.createElement("li");
            li.innerText = "太棒了！本次全部答對。";
            reviewList.appendChild(li);
        } else {
            wrongAnswers.forEach((item, index) => {
                const li = document.createElement("li");
                li.innerText = `第 ${index + 1} 題：題目「${item.prompt}」，你的答案「${item.selected}」，正確答案「${item.correct}」`;
                reviewList.appendChild(li);
            });
        }
        reviewSection.style.display = "block";
    }

    function startGame() {
        stopTimer();
        gameMode = document.getElementById("mode-select").value;
        score = 0;
        questionIndex = 0;
        wrongAnswers.length = 0;
        timerValue = QUESTION_TIME_LIMIT;
        selectedQuestions = buildQuestionSet();

        if (selectedQuestions.length < TOTAL_QUESTIONS) {
            document.getElementById("question-box").innerText = "目前此難度題庫不足 10 題，請選其他模式。";
            document.getElementById("feedback").innerText = "";
            document.getElementById("options-container").innerHTML = "";
            document.getElementById("next-btn").style.display = "none";
            document.getElementById("review-section").style.display = "none";
            document.getElementById("score").innerText = "0";
            document.getElementById("progress").innerText = `0/${TOTAL_QUESTIONS}`;
            document.getElementById("timer").innerText = `${QUESTION_TIME_LIMIT}`;
            return;
        }

        loadQuestion();
    }

    function nextQuestion() {
        loadQuestion();
    }

    // 遊戲初始化
    startGame();
</script>

</body>
</html>
