<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>洪郁棠 - Digital Card</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --text-main: #222222;
      --text-sub: #555555;
      --border: #e0e0e0;
      --accent: #4f46e5;
      --button-bg: #f3f4f6;
      --button-border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background-color 0.4s ease;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background-color: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #e5e7eb;
      background: radial-gradient(circle at 30% 30%, #e5e7eb, #cbd5f5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .name {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sub);
      text-align: center;
    }

    .subtitle-highlight {
      font-weight: 600;
      color: var(--accent);
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    .btn {
      flex: 1 1 100px;
      max-width: 140px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid var(--button-border);
      background-color: var(--button-bg);
      color: var(--text-main);
      font-size: 14px;
      text-decoration: none;
      transition: background-color 0.15s ease, box-shadow 0.15s ease,
        transform 0.1s ease, border-color 0.15s ease;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #e5e7eb;
      border-color: #d1d5db;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-primary {
      background-color: #111827;
      color: #f9fafb;
      border-color: #111827;
    }

    .btn-primary:hover {
      background-color: #020617;
      border-color: #020617;
    }

    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      user-select: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 20px 22px;
        border-radius: 14px;
      }

      .avatar {
        width: 100px;
        height: 100px;
      }

      .name {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">
        <img src="11zon_cropped.png" alt="我的頭像" style="width:100%; height:100%; border-radius:50%; object-fit:cover;" />
    </div>
    <div class="name">洪郁棠</div>
    <div class="subtitle">
      我的名字是
      <span class="subtitle-highlight">【洪郁棠】</span>，
      一個享受
      <span class="subtitle-highlight">【睡眠】</span>
      的
      <span class="subtitle-highlight">【中山】</span>
      學生！！！
    </div>

    <div class="buttons">
      <a
        class="btn btn-primary"
        href="https://www.instagram.com/tang_yu.11_24"
        target="_blank"
        rel="noopener noreferrer"
      >
        Instagram
      </a>
      <a
        class="btn"
        href="https://github.com/921124tony-web"
        target="_blank"
        rel="noopener noreferrer"
      >
        GitHub
      </a>
      <a class="btn" href="mailto:921124tony@gmail.com">
        Email
      </a>
    </div>

    <div class="hint">
      點擊背景空白處，試試隨機粉彩色 ✦
    </div>
  </div>

  <script>
  // 產生隨機粉彩色（高亮度、低飽和度）
  function randomPastelColor() {
    const hue = Math.floor(Math.random() * 360); // 0–359
    const saturation = 60 + Math.random() * 10; // 60–70%
    const lightness = 85 + Math.random() * 5; // 85–90%
    return `hsl(${hue} ${saturation}% ${lightness}%)`;
  }

  // 桌機用 click、手機用 touchstart，都呼叫同一個處理函式
  function handleBackgroundTap(e) {
    const card = document.querySelector(".card");
    // 只在點擊「卡片外」時改變背景
    if (!card.contains(e.target)) {
      document.body.style.backgroundColor = randomPastelColor();
    }
  }

  document.addEventListener("click", handleBackgroundTap);
  document.addEventListener("touchstart", handleBackgroundTap, { passive: true });
  </script>
</body>
</html>
